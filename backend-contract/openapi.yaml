openapi: 3.0.3
info:
  title: INSHOW ACADEMY API
  version: 0.1.0
servers:
  - url: https://api.inshow-academy.com
paths:
  /api/courses:
    get:
      summary: 강의 목록 조회
      parameters:
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: sort
          schema: { type: string, enum: [latest, closingSoon, priceAsc, priceDesc] }
      responses:
        '200': { description: OK }
  /api/courses/{slug}:
    get:
      summary: 강의 상세 조회
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/orders:
    post:
      summary: 주문 생성
      security:
        - cookieAuth: []
      responses:
        '201': { description: Created }
  /api/payments/confirm:
    post:
      summary: 결제 승인 및 검증
      security:
        - cookieAuth: []
      responses:
        '200': { description: Payment confirmed }
        '409': { description: Payment already confirmed or order conflict }
  /api/admin/courses:
    post:
      summary: 관리자 강의 등록
      security:
        - cookieAuth: []
      responses:
        '201': { description: Created }
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sid
